<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>APMC Price Dashboard (MVP)</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🌾 APMC Price Dashboard (Karnataka MVP)</span>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <label class="form-label fw-bold">Select Crop</label>
        <select id="cropSelect" class="form-select">
          <option value="">All Crops</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-bold">Select Market</label>
        <select id="marketSelect" class="form-select">
          <option value="">All Markets</option>
        </select>
      </div>

      <div class="col-md-4 d-flex align-items-end">
        <button id="refreshBtn" class="btn btn-primary w-100">
          🔄 Refresh Prices
        </button>
      </div>
    </div>

    <div class="alert alert-info">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <b>Status:</b> <span id="statusText">Loading...</span>
        </div>
        <div>
          <b>Last Updated:</b> <span id="lastUpdated">--</span>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">

        <h5 class="card-title mb-3">📊 Live Prices (Dummy Engine)</h5>

        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th>Crop</th>
                <th>Market</th>
                <th>Min (₹/qtl)</th>
                <th>Max (₹/qtl)</th>
                <th>Modal (₹/qtl)</th>
                <th>Updated At</th>
              </tr>
            </thead>
            <tbody id="priceTableBody">
              <tr>
                <td colspan="6" class="text-center">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

    <div class="text-muted mt-3 small">
      MVP districts: Gadag, Belagavi, Dharwad, Bagalkot, Haveri (2 markets each).
    </div>

  </div>

  <script src="js/prices.js"></script>
</body>
</html>
